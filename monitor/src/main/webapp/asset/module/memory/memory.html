<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<title>集群内存监控</title>
	<base href="/monitor/asset/"/>
	<script src="common/js/commonHeadPack.js"></script>
	<link rel="stylesheet" href="module/memory/memory.css">
</head>
<body style="background:#f2f2f2;"class="hold-transition  sidebar-mini ">
<!-- <body class="hold-transition skin-blue sidebar-mini fixed"> -->
	<script src="common/js/header.js"></script>
	<script src="common/js/slider.js"></script>
	<div style="background:#f2f2f2;position:absolute;left:220px;top:75px;width:calc(100% - 220px);bottom:0px">
<div>
<!-- <div class="wrapper"> -->
	
	<div class="content-wrapper">
	  <div style="background:#f2f2f2;position:absolute;left:0%;top:0px;width:100%;">
		<section class="content-header">
			<h1>
				System Memory & Disk Monitoring
			</h1>
			<!-- breadcrumb hidden -->
		</section>

	<section class="content">
		<div class="row">
			<div class="col-md-6 col-sm-6 col-xs-12">
				<div class="info-box">
					<span class="info-box-icon bg-maroon"><i class="fa fa-fw fa-tasks"></i></span>
					<div class="info-box-content">
						<span class="info-box-text">Disk Capacity</span>
						<span class="info-box-number fontSize40" id="diskTotal">N/A</span>
					</div>
				</div>
			</div>
			<div class="col-md-6 col-sm-6 col-xs-12">
				<div class="info-box bg-green">
					<span class="info-box-icon"><i class="fa fa-fw fa-pie-chart"></i></span>
					<div class="info-box-content">
						<span class="info-box-text">Disk Used</span>
						<span class="info-box-number" id="diskUsed">N/A</span>
						<div class="progress">
							<div class="progress-bar" style="width: 0%" id="diskused-progress-bar"></div>
						</div>
						<span class="progress-description">Used <span id="diskused-progress-description"></span>%</span>
					</div>
				</div>
			</div>
		</div>
		<div class="row">
			<div class="col-md-6 col-sm-12 col-xs-12">
				<div class="box">
					<div id="chart_mem_radar" style="width:100%;height:400px;"></div>
				</div>
			</div>
			<div class="col-md-6 col-sm-12 col-xs-12">
				<div class="box">
					<div id="chart_disk_usage" style="width:100%;height:400px;"></div>
				</div>
			</div>
		</div>
	</section>
	  </div>
	</div>

	<script src="common/js/footer.js"></script>
</div>
</div>
<script src="common/js/commonJSPack.js"></script>
<script src="plugins/echarts/echarts.js"></script>
<script src="module/memory/memory.js"></script>
<script src="module/io/io_total_free.js"></script>
<script src="module/memory/mem_chart.js"></script>
</body>
</html>
