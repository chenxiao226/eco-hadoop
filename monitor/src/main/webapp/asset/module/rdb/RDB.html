<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title></title>
<base href="/monitor/asset/" />
<script src="common/js/commonHeadPack.js"></script>
<link rel="stylesheet" href="module/rdb/RDB.css">
</head>
<!-- <body class="hold-transition skin-blue sidebar-mini fixed"> -->
<body style="background:#f2f2f2;"class="hold-transition  sidebar-mini ">
	<script src="common/js/header.js"></script>
	<script src="common/js/slider.js"></script>
	<div style="background:#f2f2f2;position:absolute;left:220px;top:75px;width:calc(100% - 220px);bottom:0px">
	<div >
	<!-- <div class="wrapper"> -->
		
		<div class="content-wrapper">
		 <div style="background:#f2f2f2;position:absolute;left:0%;top:0px;width:100%;">
			<section class="content-header">
				<h1>
					关系数据库监控<small></small>
				</h1><!-- breadcrumb hidden -->
			</section>
			<section class="content">
			<div class="row">
				<div class="col-md-4 col-sm-6 col-xs-12">
						<div class="info-box">
							<span class="info-box-icon bg-maroon"><i
								class="fa fa-fw fa-files-o"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">缓冲池页数&nbsp</span>
								<span class="info-box-number fontSize40" id="buffer">N/A</span>
							</div>
						</div>
				</div>
				<div class="col-md-4 col-sm-6 col-xs-12">
						<div class="info-box" id="yarnNodeInfoBox">
							<span class="info-box-icon bg-red"><i
								class="fa fa-fw fa-tasks"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">用户数&nbsp</span> <span
									class="info-box-number fontSize40" id="userNum">N/A</span>
							</div>
						</div>
				</div>
				<div class="col-xs-12">
						<div class="box">
							<div class="box-header">
								<h3 class="box-title">系统进程</h3>
							</div>
							<!-- /.box-header -->
							<div class="box-body">
								<table id="rdbProcessTable" class="table table-bordered table-striped">
								<thead>
									<tr>
										<th>ID</th>
										<th>User</th>
										<th>Host</th>										
										<th>Command</th>
										<th>Time(s)</th>
										<th>State</th>
									</tr>
								</thead>
								<tbody></tbody>
							</table>
							</div>
							<!-- /.box-body -->
						</div>
					</div>
				
			</div>
			<div class="row">
					<div class="col-md-12 col-sm-12 col-xs-12">
						<div class="row">
							<div class="col-md-12 col-sm-12 col-xs-12">
								<div class="box">
									<div class="row">
										<div class="col-md-10 col-sm-10 col-xs-12">
											<!-- 进程相关的信息 -->
											<div id="rdb_proc" style="width: 100%; height: 400px;"></div>
										</div>
										<div class="col-md-2 col-sm-2 col-xs-12">
											<div class="appStatistic">
												<ul class="list-group">
													<li class="list-group-item"><b>buffer命中率相关：</b></li>
													<li class="list-group-item">&nbsp;Innodb：<span
														id="Innodb_Buffer">N/A</span></li>
													
												</ul>
											</div>
										</div>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</section>
		  </div>	
		</div>
		<script src="common/js/footer.js"></script>
	</div>
	
	<script src="common/js/commonJSPack.js"></script>
	<script src="plugins/echarts/echarts.js"></script>
	<script src="module/rdb/RDB.js"></script>
	<script src="module/rdb/buffer_hit.js"></script>
</body>
</html>
