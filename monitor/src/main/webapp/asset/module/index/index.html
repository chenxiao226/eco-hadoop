<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title></title>
<base href="/monitor/asset/" />
<script src="common/js/commonHeadPack.js"></script>
<link rel="stylesheet" href="module/index/index.css">
</head>
<body style="background:#f2f2f2;"class="hold-transition  sidebar-mini ">
	<script src="common/js/header.js"></script>
	<script src="common/js/slider.js"></script>
	<div style="background:#f2f2f2;position:absolute;left:220px;top:75px;width:calc(100% - 220px);bottom:0px">
	<div>
		<div class="content-wrapper">
		<div style="background:#f2f2f2;position:absolute;left:0%;top:0px;width:100%;">
			<section class="content-header">
				<h1>Real-Time System Data Dashboard <small>Summary</small></h1>
				<!-- breadcrumb hidden -->
			</section>

			<section class="content">
				<!-- Row 1: Load + CPU -->
				<div class="row" style="display:flex; align-items:stretch;">
					<div class="col-md-7 col-sm-6 col-xs-12" style="display:flex; flex-direction:column;">
						<div class="box" style="flex:1;">
							<div class="row" style="height:100%;">
								<div class="col-md-9 col-sm-12 col-xs-12" style="height:100%;">
									<div id="loadChart" style="width: 100%; height: 300px;"></div>
								</div>
								<div class="col-md-3 col-sm-12 col-xs-12">
									<div class="loadStatistic">
										<ul class="list-group">
											<li class="list-group-item"><b>Average Load：</b></li>
											<li class="list-group-item">&nbsp;<span id="loadNum">N/A</span></li>
											<li class="list-group-item"><b>Description：</b></li>
											<li class="list-group-item">&nbsp;Low Pressure：<span>0-1</span></li>
											<li class="list-group-item">&nbsp;Medium Pressure：<span>1-2</span></li>
											<li class="list-group-item">&nbsp;High Pressure：<span>2-3</span></li>
											<li class="list-group-item">&nbsp;Extremely High：<span>&gt;3</span></li>
										</ul>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="col-md-5 col-sm-6 col-xs-12" style="display:flex; flex-direction:column;">
						<div class="box" style="flex:1; display:flex; flex-direction:column;">
							<div id="cpuChart" style="width: 100%; flex:1; min-height:300px;"></div>
						</div>
					</div>
				</div>

				<!-- Row 2: Info boxes -->
				<div class="row">
					<div class="col-md-3 col-sm-6 col-xs-12">
						<div class="info-box">
							<span class="info-box-icon bg-maroon"><i class="fa fa-fw fa-hdd-o"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">Disk Read</span>
								<span class="info-box-number fontSize40" id="diskReadField">N/A</span>
							</div>
						</div>
					</div>
					<div class="col-md-3 col-sm-6 col-xs-12">
						<div class="info-box">
							<span class="info-box-icon bg-red"><i class="fa fa-fw fa-exchange"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">Network In</span>
								<span class="info-box-number fontSize40" id="networkInField">N/A</span>
							</div>
						</div>
					</div>
					<div class="clearfix visible-sm-block"></div>
					<div class="col-md-3 col-sm-6 col-xs-12">
						<div class="info-box clickInfoBox" id="diskInfoBox">
							<span class="info-box-icon bg-yellow"><i class="fa fa-fw fa-files-o"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">Disk Usage Rate</span>
								<span class="info-box-number fontSize40" id="diskRateField">N/A</span>
							</div>
						</div>
					</div>
					<div class="col-md-3 col-sm-6 col-xs-12">
						<div class="info-box clickInfoBox" id="memInfoBox">
							<span class="info-box-icon bg-olive"><i class="fa fa-fw fa-pie-chart"></i></span>
							<div class="info-box-content">
								<span class="info-box-text">Memory</span>
								<span class="info-box-number fontSize40" id="memRateField">N/A</span>
							</div>
						</div>
					</div>
				</div>

			</section>
		</div>
		</div>
		<script src="common/js/footer.js"></script>
	</div>

	<!-- alert modal hidden
	<div class="modal fade" id="alertContentModal">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<button type="button" class="close" data-dismiss="modal" aria-label="Close">
						<span aria-hidden="true">×</span></button>
					<h4 class="modal-title">Alert Detail</h4>
				</div>
				<div class="modal-body">
					<p id="alertDetailContent"></p>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
				</div>
			</div>
		</div>
	</div>
	-->
	</div>
	<script src="common/js/commonJSPack.js"></script>
	<script src="plugins/echarts/echarts.js"></script>
	<script src="module/index/index.js"></script>
	<script src="module/index/cpu_chart.js"></script>
	<script src="module/index/load_chart.js"></script>

</body>
</html>
