apiVersion: apps/v1
kind: Deployment
metadata:
  name: web0
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web0
  template:
    metadata:
      labels:
        app: web0
    spec:
      containers:
      - env:
        - name: MY_CGROUP_MODE
          value: systemd
        image: docker.io/jenkins/jenkins:latest
        imagePullPolicy: IfNotPresent
        name: jenkins
        ports:
        - containerPort: 8080
          hostPort: 30080
        resources:
          limits:
            cpu: 1000m
            memory: 1.5Gi
          requests:
            cpu: 1000m
            memory: 1.5Gi
        volumeMounts: []
      nodeSelector:
        kubernetes.io/hostname: slave1
      priorityClassName: high-priority
      restartPolicy: Always
      volumes: []
