apiVersion: apps/v1
kind: Deployment
metadata:
  name: web0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web0
  template:
    metadata:
      labels:
        app: web0
    spec:
      nodeSelector:
        kubernetes.io/hostname: slave1   # ⚠️ 确保是 slave1 的实际主机名
      containers:
      - name: jenkins
        image: docker.io/jenkins/jenkins:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          hostPort: 30080
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: web0-service
spec:
  type: NodePort
  selector:
    app: web0
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30080
